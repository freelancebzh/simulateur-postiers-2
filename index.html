<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avantages Postiers</title>
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            margin: 0;
            padding: 0;
            background-color: #000000;
            color: #ffffff;
            font-family: 'Times New Roman', Times, serif;
            height: 100vh;
            display: table;
            width: 100%;
            text-align: center;
        }
        .wrapper {
            display: table-cell;
            vertical-align: middle;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
        }
        .item {
            margin-bottom: 40px;
        }
        .latin {
            font-size: 36pt;
            font-weight: bold;
            letter-spacing: 2px;
            margin-bottom: 5px;
            color: #ffffff;
        }
        .traduction {
            font-size: 16pt;
            font-style: italic;
            color: #aaaaaa;
        }
    </style>
</head>
<body>

    <div class="wrapper">
        <div class="container">
            <div class="item">
                <div class="latin">Vidi</div>
                <div class="traduction">J'ai vu</div>
            </div>
            <div class="item">
                <div class="latin">Probavi</div>
                <div class="traduction">J'ai testé</div>
            </div>
            <div class="item">
                <div class="latin">Discessi</div>
                <div class="traduction">Je suis parti</div>
            </div>
        </div>
    </div>

</body>
</html>
